<style>
  :root {

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Outfit', sans-serif;

  body.cursor-enabled { cursor: none; }
  body.cursor-enabled a,
  body.cursor-enabled button,
  body.cursor-enabled [role="button"],
  body.cursor-enabled .nav-cta,
  body.cursor-enabled .btn { cursor: none; }

  #cursor-dot, #cursor-ring {
    display: none; pointer-events: none;
    position: fixed; transform: translate(-50%, -50%); z-index: 9999;
  }
  #cursor-dot {
    width: 10px; height: 10px; border-radius: 50%; background: var(--green);
    transition: background 0.25s ease;
  }
  #cursor-ring {
    width: 38px; height: 38px; border-radius: 50%;
    border: 1.5px solid var(--green); opacity: 0.45;
    transition: width 0.35s ease, height 0.35s ease, opacity 0.25s ease;
  }
  body.cursor-enabled #cursor-dot,
  body.cursor-enabled #cursor-ring { display: block; }
  body.cursor-hover #cursor-dot { background: var(--rose); }
  body.cursor-hover #cursor-ring { width: 60px; height: 60px; opacity: 0; }
  body.cursor-dark #cursor-ring { border-color: rgba(255,255,255,0.42); }

  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;

  .support-links a:hover {

  <script>
    (function initAnalyticsTracking() {
      if (window.__bujeAnalyticsInitialized) return;
      window.__bujeAnalyticsInitialized = true;

      let scroll50Tracked = false;
      let scroll90Tracked = false;
      let formStarted = false;
      const seenSections = new Set();

      window.addEventListener('scroll', () => {
        const scrollPercent = (window.scrollY + window.innerHeight) / document.documentElement.scrollHeight;

        if (!scroll50Tracked && scrollPercent > 0.5) {
          scroll50Tracked = true;
          trackEvent('scroll_50', 'Engagement', 'Scroll 50%');
        }

        if (!scroll90Tracked && scrollPercent > 0.9) {
          scroll90Tracked = true;
          trackEvent('scroll_90', 'Engagement', 'Scroll 90%');
        }
      }, { passive: true });

      const trackableSections = document.querySelectorAll('section[id]');
      const sectionViewObserver = new IntersectionObserver((entries) => {
        entries.forEach((entry) => {
          if (!entry.isIntersecting || seenSections.has(entry.target.id)) return;
          seenSections.add(entry.target.id);
          trackEvent('section_view', 'Engagement', entry.target.id, { section_id: entry.target.id });
        });
      }, { threshold: 0.5 });
      trackableSections.forEach((section) => sectionViewObserver.observe(section));

      document.querySelectorAll('input, textarea').forEach((field) => {
        field.addEventListener('focus', () => {
          if (formStarted) return;
          formStarted = true;
          trackEvent('form_start', 'Lead', 'Form Start');
        }, { once: true });
      });
    })();

    const enableCursor = window.matchMedia('(min-width: 960px) and (pointer: fine)');
    const dot = document.getElementById('cursor-dot');
    const ring = document.getElementById('cursor-ring');
    function setCursorMode() {
      if (enableCursor.matches) document.body.classList.add('cursor-enabled');
      else document.body.classList.remove('cursor-enabled', 'cursor-hover', 'cursor-dark');
    }
    setCursorMode();
    enableCursor.addEventListener('change', setCursorMode);

    let mouseX = window.innerWidth / 2, mouseY = window.innerHeight / 2;
    let ringX = mouseX, ringY = mouseY;

    window.addEventListener('mousemove', (e) => {
      if (!enableCursor.matches) return;
      mouseX = e.clientX; mouseY = e.clientY;
      dot.style.left = mouseX + 'px'; dot.style.top = mouseY + 'px';
    });
    function animateRing() {
      if (enableCursor.matches) {
        ringX += (mouseX - ringX) * 0.18;
        ringY += (mouseY - ringY) * 0.18;
        ring.style.left = ringX + 'px'; ring.style.top = ringY + 'px';
      }
      requestAnimationFrame(animateRing);
    }
    animateRing();

    document.querySelectorAll('a, button, .btn').forEach((el) => {
      el.addEventListener('mouseenter', () => { if (enableCursor.matches) document.body.classList.add('cursor-hover'); });
      el.addEventListener('mouseleave', () => document.body.classList.remove('cursor-hover'));
    });

    const darkSections = document.querySelectorAll('body');
    const darkObs = new IntersectionObserver((entries) => {
      entries.forEach((e) => {
        if (!enableCursor.matches) return;
        if (e.isIntersecting) document.body.classList.add('cursor-dark');
        else {
          const anyDark = Array.from(darkSections).some((s) => {
            const r = s.getBoundingClientRect();
            return r.top < window.innerHeight && r.bottom > 0;
          });
          if (!anyDark) document.body.classList.remove('cursor-dark');
        }
      });
    }, { threshold: 0.1 });
    darkSections.forEach((s) => darkObs.observe(s));
  </script>
